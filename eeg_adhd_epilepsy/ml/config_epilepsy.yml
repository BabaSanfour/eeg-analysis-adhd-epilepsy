# -----------------------------------------------------------------------------
# config for MLPipeline on Epilepsy classification using merged features+patients
# -----------------------------------------------------------------------------

global_experiment_id: "epilepsy_merged_features"
data_path: "/Users/hamzaabdelhedi/Projects/data/EEG_psychostimulant_data/EEG_psychostimulants_2025-02/BIDS/derivatives/signal_features/descriptors/combined/subject_features.csv"
results_dir: "data/results/ml"
results_file: "epilepsy_merged"

defaults:
  random_state: 42
  n_jobs: -1
  cv_kwargs:
    cv_strategy: "stratified"
    n_splits: 5
    shuffle: true
    random_state: 42
  # Feature cleaning configuration (applied after selection)
  clean_cfg:
    mode: "any"
    sep: ".spaces-"
    reverse: true
    verbose: true
    min_abs_value: 
    min_abs_fraction: 0.0
  # Grid balance flags (if supported by coco-pipe)
  grid_balance: false
  require_full_grid: false
  target_columns: ["Epilepsy"]
  sep: ".spaces-"
  reverse: true
  spatial_units: ['C3', 'C4', 'Cz', 'F3', 'F4', 'F7', 'F8', 'Fp1', 'Fp2', 'Fz', 'O1', 'O2', 'P3', 'P4', 'Pz', 'T3', 'T4', 'T5', 'T6']
  # Base feature names (run_ml_pipe will prefix with 'feature-')
  feature_names:
    - "BandRatiosFromAverageFooof.bands_pairs-('delta', 'theta')"
    - "BandRatiosFromAverageFooof.bands_pairs-('delta', 'alpha')"
    - "BandRatiosFromAverageFooof.bands_pairs-('delta', 'beta')"
    - "BandRatiosFromAverageFooof.bands_pairs-('delta', 'gamma')"
    - "BandRatiosFromAverageFooof.bands_pairs-('theta', 'alpha')"
    - "BandRatiosFromAverageFooof.bands_pairs-('theta', 'beta')"
    - "BandRatiosFromAverageFooof.bands_pairs-('theta', 'gamma')"
    - "BandRatiosFromAverageFooof.bands_pairs-('alpha', 'beta')"
    - "BandRatiosFromAverageFooof.bands_pairs-('alpha', 'gamma')"
    - "BandRatiosFromAverageFooof.bands_pairs-('beta', 'gamma')"
    - "BandRatiosFromAverageSpectrum.bands_pairs-('delta', 'theta')"
    - "BandRatiosFromAverageSpectrum.bands_pairs-('delta', 'alpha')"
    - "BandRatiosFromAverageSpectrum.bands_pairs-('delta', 'beta')"
    - "BandRatiosFromAverageSpectrum.bands_pairs-('delta', 'gamma')"
    - "BandRatiosFromAverageSpectrum.bands_pairs-('theta', 'alpha')"
    - "BandRatiosFromAverageSpectrum.bands_pairs-('theta', 'beta')"
    - "BandRatiosFromAverageSpectrum.bands_pairs-('theta', 'gamma')"
    - "BandRatiosFromAverageSpectrum.bands_pairs-('alpha', 'beta')"
    - "BandRatiosFromAverageSpectrum.bands_pairs-('alpha', 'gamma')"
    - "BandRatiosFromAverageSpectrum.bands_pairs-('beta', 'gamma')"
    - "RelativeBandPowerFromAverageFooof.bands-alpha"
    - "RelativeBandPowerFromAverageFooof.bands-beta"
    - "RelativeBandPowerFromAverageFooof.bands-delta"
    - "RelativeBandPowerFromAverageFooof.bands-gamma"
    - "RelativeBandPowerFromAverageFooof.bands-theta"
    - "RelativeBandPowerFromAverageSpectrum.bands-alpha"
    - "RelativeBandPowerFromAverageSpectrum.bands-beta"
    - "RelativeBandPowerFromAverageSpectrum.bands-delta"
    - "RelativeBandPowerFromAverageSpectrum.bands-gamma"
    - "RelativeBandPowerFromAverageSpectrum.bands-theta"
    - "appEntropyMeanEpochs"
    - "entropyMultiscaleMeanEpochs"
    - "foofOffset"
    - "fooofExponent"
    - "higuchiFdMeanEpochs"
    - "higuchiFdVarEpochs"
    - "hjorthComplexityMeanEpochs"
    - "hjorthMobilityMeanEpochs"
    - "katzFdMeanEpochs"
    - "katzFdSDEpochs"
    - "lzivComplexityMeanEpochs"
    - "numZerocrossMeanEpochs"
    - "permEntropyMeanEpochs"
    - "petrosianFdMeanEpochs"
    - "sampleEntropyMeanEpochs"
    - "spectralEntropyMeanEpochs"
    - "svdEntropyMeanEpochs"
  balance:
    strategy: "undersample"
    covariates: ["Age", "Sex"]
    qbins: 5
    binning: "quantile"
    seed: 42
    prefer_clean_rows: true

analyses:
  - id: "classification_baseline"
    task: "classification"
    analysis_type: "baseline"
    row_filter:
      - column: "TDAH"
        values: "0"
        operator: "=="
      - column: "TSA"
        values: "0"
        operator: "=="
      - column: "Epilepsy"
        values: "2"
        operator: "!="

    models:
      - "Logistic Regression"
    metrics:
      - "accuracy" 
      - "roc_auc"
      - "f1"
    scoring: "accuracy"

  - id: "classification_feature_selection"
    task: "classification"
    analysis_type: "feature_selection"
    models:
      - "Random Forest"
    metrics:
      - "f1"
      - "roc_auc"
      - "accuracy"
    n_features: 5
    direction: "forward"
    scoring: "accuracy"
