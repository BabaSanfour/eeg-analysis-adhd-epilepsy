# -----------------------------------------------------------------------------
# config for MLPipeline on ADHD dataset
# -----------------------------------------------------------------------------

# Global parameters shared across analyses
global_experiment_id: "exploratory_analysis_ADHD_20_05_2025"
data_path: "/Users/hamzaabdelhedi/Projects/data/EEG_psychostimulant_data/EEG_psychostimulants_2025-02/csv/demo_psychostim_vs_none.csv"
results_dir: "./results_"
results_file: "exploratory_analysis_ADHD_20_05_2025"

# Default analysis parameters (can be overridden per analysis)
defaults:
  random_state: 42
  n_jobs: -1
  cv_kwargs:
    cv_strategy: "stratified"
    n_splits: 5
    shuffle: true
    random_state: 42
  target_columns: ["target"]
  spatial_units: ['C3', 'C4', 'Cz', 'F3', 'F4', 'F7', 'F8', 'Fp1', 'Fp2', 'Fz', 'O1',
       'O2', 'P3', 'P4', 'Pz', 'T3', 'T4', 'T5', 'T6']
  feature_names: [
       'feature-svdEntropyMeanEpochs'
       ]

# List of analyses to run
analyses:
  - id: "classification_feature_selection"
    task: "classification"
    analysis_type: "feature_selection"
    models:
      - "SVC"
    metrics:
      - "f1"
      - "roc_auc"
      - "accuracy"
    n_features: 2
    direction: "forward"
    scoring: "accuracy"

