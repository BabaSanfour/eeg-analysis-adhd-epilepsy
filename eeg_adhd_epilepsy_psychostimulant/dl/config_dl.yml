# ---------------------------------------------------------------------------
# DL config focused on Epilepsy classification using CBraMod embeddings
# generated from the BIDS dataset under /home/mat/scratch/derivatives.
# ---------------------------------------------------------------------------

global_experiment_id: "epilepsy_cbramod_dl"
summary_filename: "epilepsy_cbramod_dl_summary_car.csv"
results_dir: "data/results/dl"

defaults:
  foundation_model: "cbramod"        # future: reve, toto
  task: "classification"
  analysis_type: "hp_search"
  metrics: ["accuracy", "f1", "balanced_accuracy"]
  base_classifier: "hist_gradient_boosting"
  optuna_trials: 15
  random_state: 42
  n_jobs: 1
  cv_kwargs:
    cv_strategy: "stratified_group_kfold"
    n_splits: 3
    shuffle: true
    random_state: 42
  target_columns: ["Epilepsy"]

  # Embedding config:
  # - source: precomputed -> use an existing embeddings CSV (preferred)
  # - source: bids -> compute CBraMod embeddings from the BIDS derivatives
  embedding:
    source: "precomputed"
    data_path: "data/results/dl/cbramod_embeddings_1s.csv"
    cache_path: null
    overwrite: false

  # Feature handling
  use_scaler: true
  na_drop_frac: 0.8        # relax drop threshold; keep more cols and impute
  near_const_std: 1e-6     # drop near-constant feature columns

  # Hyperparameter search for downstream classifier
  # If base_classifier is 'hist_gradient_boosting', these apply:
  hp_search_params:
    base_classifier__learning_rate: [0.05, 0.1, 0.2]
    base_classifier__max_depth: [3, 5, 10]
    base_classifier__max_iter: [200, 400]
    base_classifier__l2_regularization: [0.0, 0.001, 0.01]

  # Permutation importance settings
  perm_importance_repeats: 2
  perm_importance_sample_size: 50000
  # Feature selection permutation settings
  fs_perm_repeats: 2
  fs_perm_sample_size: 50000
  # Subject aggregation and threshold tuning
  subject_agg: "mean"
  subject_agg_quantile: 0.8


  # Subject-level labels to merge onto segment embeddings
  target_path: "data/results/dl/labels_from_prepared.csv"

analyses:
  - id: "epilepsy_cls"
    target_columns: ["Epilepsy"]
    metrics: ["accuracy", "f1", "balanced_accuracy"]
    results_file: "epilepsy_cbramod_cls"
