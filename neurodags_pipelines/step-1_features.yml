# Feature extraction pipeline — neurodags equivalent of coco-pipe descriptors.
#
# Input: preprocessed epoch .fif files from step-0_preprocessing.yml
#        (SourceFile = *@BasicPrep.fif, dims: epochs × spaces × times, 256 Hz, 1–45 Hz)
#
# Bands (matching configs/descriptors.yaml):
#   delta [1–4], theta [4–8], alpha [8–13], beta [13–30], gamma [30–45]
#
# Spectral outputs (per band, per epoch, per channel):
#   absolute power, log absolute, relative, corrected absolute,
#   corrected log absolute, corrected relative, band ratios (10 pairs), FOOOF scalars
#
# Complexity outputs (per epoch, per channel):
#   antropy: sample/app/perm/svd/spectral entropy, Hjorth, LZiv, zero crossings,
#            Higuchi/Katz/Petrosian FD, detrended fluctuation
#   neurokit2: multiscale/Shannon/fuzzy/dispersion entropy, Hurst exponent
#
# Stats: kurtosis, RMS
#
# All *Mean derivatives aggregate across epochs (for_dataframe: True → included in CSV).
# Intermediate computations (PSD, FOOOF, per-epoch features) are cached on disk.
#
# Usage:
#   neurodags run  neurodags_pipelines/step-1_features.yml
#   neurodags dataframe neurodags_pipelines/step-1_features.yml --output features.csv

datasets: datasets_preprocessed.yml
mount_point: local

# Shared band definition — matches configs/descriptors.yaml
# Referenced as YAML anchor to keep all bandpower nodes consistent.
_bands: &BANDS
  delta: [1.0, 4.0]
  theta: [4.0, 8.0]
  alpha: [8.0, 13.0]
  beta: [13.0, 30.0]
  gamma: [30.0, 45.0]

DerivativeDefinitions:

  # ---------------------------------------------------------------------------
  # Shared intermediates: PSD (Welch) and FOOOF fit
  # Computed once and reused by all spectral consumers.
  # ---------------------------------------------------------------------------

  SpectrumWelch:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: SourceFile
      - id: 1
        node: mne_spectrum_array
        args:
          meeg: id.0
          method: welch
          method_kwargs:
            fmin: 1.0
            fmax: 45.0
            n_fft: 512
            n_overlap: 256

  FooofFit:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: SpectrumWelch.nc
      - id: 1
        node: extract_data_var
        args:
          dataset_like: id.0
          data_var: spectrum
      - id: 2
        node: fooof
        args:
          psd_like: id.1
          freq_dim: frequencies
          fooof_options:
            FOOOF:
              aperiodic_mode: fixed
              max_n_peaks: 6
              peak_width_limits: [1.0, 12.0]
            fit:
              freq_range: [1, 45]
            freq_res: 0.5
            save:
              save_results: True
              save_settings: True
              save_data: True

  # ---------------------------------------------------------------------------
  # Absolute band power
  # ---------------------------------------------------------------------------

  AbsBandPower:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: SpectrumWelch.nc
      - id: 1
        node: extract_data_var
        args:
          dataset_like: id.0
          data_var: spectrum
      - id: 2
        node: bandpower
        args:
          psd_like: id.1
          bands: *BANDS
          relative: False
          log_transform: False

  AbsBandPowerMean:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: AbsBandPower.nc
      - id: 1
        node: aggregate_across_dimension
        args:
          xarray_data: id.0
          dim: epochs
          operation: mean

  # ---------------------------------------------------------------------------
  # Log absolute band power
  # ---------------------------------------------------------------------------

  LogBandPower:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: SpectrumWelch.nc
      - id: 1
        node: extract_data_var
        args:
          dataset_like: id.0
          data_var: spectrum
      - id: 2
        node: bandpower
        args:
          psd_like: id.1
