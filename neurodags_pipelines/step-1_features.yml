          xarray_data: id.0
          dim: epochs
          operation: mean

  # ---------------------------------------------------------------------------
  # Band ratios — 10 ordered pairs matching configs/descriptors.yaml ratio_pairs
  # (always lower-band / higher-band, matching neuroscience convention)
  # BandRatiosOnMeans computes ratios on per-recording mean band power (point 4).
  # ---------------------------------------------------------------------------

  BandRatios:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: AbsBandPower.nc
      - id: 1
        node: band_ratios
        args:
          bandpower_like: id.0
          combinations:
            - [delta, theta]
            - [delta, alpha]
            - [delta, beta]
            - [delta, gamma]
            - [theta, alpha]
            - [theta, beta]
            - [theta, gamma]
            - [alpha, beta]
            - [alpha, gamma]
            - [beta, gamma]

  BandRatiosMean:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: BandRatios.nc
      - id: 1
        node: aggregate_across_dimension
        args:
          xarray_data: id.0
          dim: epochs
          operation: mean

  BandRatiosMedian:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: BandRatios.nc
      - id: 1
        node: aggregate_across_dimension
        args:
          xarray_data: id.0
          dim: epochs
          operation: median

  BandRatiosIQR:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
