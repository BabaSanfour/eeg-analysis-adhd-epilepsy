DerivativeList:
  # Shared spectral intermediates (computed once, cached)
  - SpectrumWelch
  - FooofFit

  # Absolute band power (mean + pooled; no median/IQR per descriptors.yaml band_summaries exclusion)
  - AbsBandPower
  - AbsBandPowerMean
  - AbsBandPowerAgg
  - AbsBandPowerPooled
  - AbsBandPowerPooledMean

  # Log absolute band power (mean + median + IQR + pooled)
  - LogBandPower
  - LogBandPowerMean
  - LogBandPowerMedian
  - LogBandPowerIQR
  - LogBandPowerPooled
  - LogBandPowerPooledMean

  # Relative band power (mean + median + IQR + pooled)
  - RelBandPower
  - RelBandPowerMean
  - RelBandPowerMedian
  - RelBandPowerIQR
  - RelBandPowerPooled
  - RelBandPowerPooledMean

  # Corrected absolute band power (mean + pooled + saved agg for ratio-of-means)
  - CorrectedBandPower
  - CorrectedBandPowerMean
  - CorrectedBandPowerAgg
  - CorrectedBandPowerPooled
  - CorrectedBandPowerPooledMean

  # Corrected log absolute band power (mean + median + IQR + pooled)
