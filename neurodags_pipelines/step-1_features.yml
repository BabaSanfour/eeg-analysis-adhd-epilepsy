  LogBandPowerMean:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: LogBandPower.nc
      - id: 1
        node: aggregate_across_dimension
        args:
          xarray_data: id.0
          dim: epochs
