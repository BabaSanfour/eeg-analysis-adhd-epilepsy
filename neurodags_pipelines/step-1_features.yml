            - [delta, alpha]
            - [delta, beta]
            - [delta, gamma]
            - [theta, alpha]
            - [theta, beta]
            - [theta, gamma]
            - [alpha, beta]
            - [alpha, gamma]
            - [beta, gamma]

  BandRatiosPooled:
