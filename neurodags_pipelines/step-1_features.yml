  # ---------------------------------------------------------------------------
  # Band ratios — 10 ordered pairs matching configs/descriptors.yaml ratio_pairs
  # (always lower-band / higher-band, matching neuroscience convention)
  # ---------------------------------------------------------------------------

  BandRatios:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: AbsBandPower.nc
      - id: 1
        node: band_ratios
        args:
          bandpower_like: id.0
          combinations:
            - [delta, theta]
            - [delta, alpha]
            - [delta, beta]
            - [delta, gamma]
            - [theta, alpha]
            - [theta, beta]
            - [theta, gamma]
            - [alpha, beta]
            - [alpha, gamma]
            - [beta, gamma]

