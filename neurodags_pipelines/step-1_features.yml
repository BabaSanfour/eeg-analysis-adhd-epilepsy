          dataset_like: id.0
          data_var: spectrum
      - id: 3
        node: extract_data_var
        args:
          dataset_like: id.1
          data_var: fooof
      - id: 4
        node: bandpower_corrected
        args:
          psd_like: id.2
          fooof_like: id.3
          bands: *BANDS
          relative: False
          log_transform: False

  CorrectedBandPowerMean:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
