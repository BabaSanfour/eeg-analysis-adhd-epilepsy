  LogBandPowerIQR:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: LogBandPower.nc
      - id: 1
        node: iqr_across_dimension
        args:
          xarray_data: id.0
          dim: epochs

  LogBandPowerPooled:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: LogBandPower.nc
      - id: 1
        node: pool_channels
        args:
          xarray_data: id.0
          channel_groups: *CHANNEL_GROUPS

  LogBandPowerPooledMean:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: LogBandPowerPooled.nc
      - id: 1
        node: aggregate_across_dimension
        args:
          xarray_data: id.0
