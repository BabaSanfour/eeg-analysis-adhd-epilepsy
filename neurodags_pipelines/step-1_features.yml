          dim: epochs

  # Ratios of means — ratio computed on per-recording mean, not mean of per-epoch ratios
  BandRatiosOnMeans:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: AbsBandPowerAgg.nc
      - id: 1
        node: band_ratios
        args:
          bandpower_like: id.0
          combinations:
            - [delta, theta]
            - [delta, alpha]
            - [delta, beta]
            - [delta, gamma]
            - [theta, alpha]
            - [theta, beta]
            - [theta, gamma]
            - [alpha, beta]
            - [alpha, gamma]
            - [beta, gamma]

  # Ratios of corrected absolute power means — matches agg_band_corr_ratio_* in extract_descriptors.py
  BandRatiosOnCorrectedMeans:
    overwrite: False
    save: False
    for_dataframe: True
    nodes:
      - id: 0
        derivative: CorrectedBandPowerAgg.nc
      - id: 1
