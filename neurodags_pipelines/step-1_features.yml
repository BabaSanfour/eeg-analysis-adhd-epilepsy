      - id: 1
        node: aggregate_across_dimension
        args:
          xarray_data: id.0
          dim: epochs
          operation: mean

  # ---------------------------------------------------------------------------
  # FOOOF scalars: aperiodic exponent, offset, fit quality (R²)
  # ---------------------------------------------------------------------------

  FooofScalarsDs:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: FooofFit.nc
      - id: 1
        node: extract_data_var
        args:
          dataset_like: id.0
          data_var: fooof
      - id: 2
