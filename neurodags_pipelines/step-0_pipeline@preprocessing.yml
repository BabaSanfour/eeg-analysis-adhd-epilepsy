# Artifact-cleaned preprocessing pipeline.
#
# Port of eeg_adhd_epilepsy/preproc/base.py run_base_pipeline.
# Produces the following derivatives per source recording (pure per-SourceFile):
#
#   CleanedPrepRaw — fully annotated continuous Raw:
#     0. inject_block_annotations      : read *_segments.csv sidecar → inject BLOCK_* annotations
#     1. inflate_bad_annotations       : expand manual BAD_ marks to fixed durations
#     2. preprocess_raw                : bandpass 0.1–100 Hz, resample 256 Hz
#     3. zapline_denoise               : remove 60 Hz line noise
#     4. ransac_bad_channels           : mark broken channels (use block_label for rest subset)
#     5. apply_car                     : common average reference (bads excluded)
#     6. autoreject_annotate_blockwise : per-condition AR → BAD_epoch_{cond} + BAD_{cond} annotations
#
#   CorrectRaw  — ICA artifact correction (DSS for EOG/ECG, MWF for EMG)
#   DenoiseRaw  — residual transient denoising (Wiener filter)
#
# QC records, HTML reports, and the dataset-level summary are in:
#   step-0_pipeline@qc.yml  (run after this pipeline)
#
# Condition epoching is done in step-1_pipeline@extraction.yml (in-memory, save: False).
#
# Usage:
#   neurodags run neurodags_pipelines/step-0_pipeline@preprocessing.yml
#   neurodags run neurodags_pipelines/step-0_pipeline@qc.yml

new_definitions:
  - nodes_utils.py
  - nodes_preprocessing.py
  - nodes_annotations.py
  - nodes_denoise.py
  - nodes_bad_channels.py
  - nodes_autoreject.py
  - nodes_ica.py
datasets: step-0_dataset.yml
mount_point: local

DerivativeDefinitions:

  CleanedPrepRaw:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: SourceFile

      # 1. Inject BLOCK_* annotations from *_segments.csv sidecar.
      #    Required for RANSAC block_label and autoreject_annotate_blockwise.
      #    Skips silently when no CSV is found (e.g. synthetic data).
      - id: 1
        node: inject_block_annotations
        args:
          mne_object: id.0

      # 2. Expand manual BAD_ annotations to fixed durations by label type.
      #    Harmless if no manual annotations are present.
      - id: 2
        node: inflate_bad_annotations
        args:
          mne_object: id.1
          default_duration: 3.0
          major_duration: 5.0

      # 3. Resample to 256 Hz (anti-alias) then filter 0.1–100 Hz — matches base.py order
      - id: 3
        node: preprocess_raw
        args:
          mne_object: id.2
          filter_args:
            l_freq: 0.1
            h_freq: 100.0
          resample: 256
          resample_first: True

      # 4. ZapLine: remove 60 Hz power line noise from continuous raw
      - id: 4
        node: zapline_denoise
        args:
          mne_object: id.3
          line_freq: 60.0
          adaptive: False

      # 5. RANSAC: mark broken channels using EC (rest) windows only.
      #    Biases bad-channel detection toward intrinsic quality, not task artifacts.
      - id: 5
        node: ransac_bad_channels
        args:
          mne_object: id.4
          block_label: EC

      # 6. CAR: common average reference (bads from step 5 are excluded)
      - id: 6
        node: apply_car
        args:
          mne_object: id.5

      # 7. Condition-grouped AutoReject — port of annotate_artifacts_blockwise.
      #    One AR instance per BLOCK_* condition group.
      #    Adds BAD_epoch_{cond} (whole-epoch) and BAD_{cond} (per-channel span).
      - id: 7
        node: autoreject_annotate_blockwise
        args:
          mne_object: id.6
          annotation_prefix: "BLOCK_"
          segment_duration: 1.0
          min_epochs: 5
          ar_max_chunk_minutes: 30.0
          n_jobs: 1

  CorrectRaw:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: CleanedPrepRaw.fif
      - id: 1
        node: source_correction
        args:
          mne_object: id.0
          eog_method: dss
          ecg_method: dss
          emg_method: mwf
          ica_n_components: 20
          random_state: 42

  DenoiseRaw:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: CorrectRaw.fif
      - id: 1
        node: residual_denoise
        args:
          mne_object: id.0
          transient_method: wiener
          n_jobs: 1

DerivativeList:
  - CleanedPrepRaw
  - CorrectRaw
  - DenoiseRaw
