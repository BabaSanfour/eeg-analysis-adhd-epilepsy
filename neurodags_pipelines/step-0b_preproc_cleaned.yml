# Artifact-cleaned preprocessing pipeline.
#
# Port of eeg_adhd_epilepsy/preproc/base.py run_base_pipeline.
# Produces TWO derivatives per source recording:
#
#   CleanedPrepRaw — fully annotated continuous Raw:
#     1. inflate_bad_annotations       : expand manual BAD_ marks to fixed durations
#     2. preprocess_raw                : bandpass 0.1–100 Hz, resample 256 Hz
#     3. zapline_denoise               : remove 60 Hz line noise
#     4. ransac_bad_channels           : mark broken channels (use block_label for rest subset)
#     5. apply_car                     : common average reference (bads excluded)
#     6. autoreject_annotate_blockwise : per-condition AR → BAD_epoch_{cond} + BAD_{cond} annotations
#
#   CleanedPrep — fixed-length 2 s Epochs from CleanedPrepRaw:
#     epoch_fixed_length(reject_by_annotation="omit")
#
# CleanedPrepRaw is also read by step-0c_conditions.yml (via datasets_cleaned_raw.yml)
# for condition-level epoch extraction — no re-preprocessing needed there.
#
# Output:
#   {reference_base}@CleanedPrepRaw.fif  (MNE Raw, fully annotated)
#   {reference_base}@CleanedPrep.fif     (MNE Epochs, 2 s, AR-cleaned)
#
# Usage:
#   neurodags run neurodags_pipelines/step-0b_preproc_cleaned.yml
#   neurodags run neurodags_pipelines/step-0c_conditions.yml  # reads CleanedPrepRaw

new_definitions: custom_nodes.py
datasets: datasets_raw.yml
mount_point: local

DerivativeDefinitions:

  CleanedPrepRaw:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: SourceFile

      # 1. Expand manual BAD_ annotations to fixed durations by label type.
      #    Harmless if no manual annotations are present.
      - id: 1
        node: inflate_bad_annotations
        args:
          mne_object: id.0
          default_duration: 3.0
          major_duration: 5.0

      # 2. Filter (0.1–100 Hz) + resample — wide band preserved for ZapLine
      - id: 2
        node: preprocess_raw
        args:
          mne_object: id.1
          filter_args:
            l_freq: 0.1
            h_freq: 100.0
          resample: 256

      # 3. ZapLine: remove 60 Hz power line noise from continuous raw
      - id: 3
        node: zapline_denoise
        args:
          mne_object: id.2
          line_freq: 60.0
          adaptive: False

      # 4. RANSAC: mark broken channels using EC (rest) windows only.
      #    Biases bad-channel detection toward intrinsic quality, not task artifacts.
      - id: 4
        node: ransac_bad_channels
        args:
          mne_object: id.3
          block_label: EC

      # 5. CAR: common average reference (bads from step 4 are excluded)
      - id: 5
        node: apply_car
        args:
          mne_object: id.4

      # 6. Condition-grouped AutoReject — port of annotate_artifacts_blockwise.
      #    One AR instance per BLOCK_* condition group.
      #    Adds BAD_epoch_{cond} (whole-epoch) and BAD_{cond} (per-channel span).
      - id: 6
        node: autoreject_annotate_blockwise
        args:
          mne_object: id.5
          annotation_prefix: "BLOCK_"
          segment_duration: 1.0
          min_epochs: 5
          ar_max_chunk_minutes: 30.0
          n_jobs: 1

  CleanedPrep:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: CleanedPrepRaw.fif

      # Fixed-length 2 s epochs; bad segments (BAD_epoch_* annotations) omitted
      - id: 1
        node: epoch_fixed_length
        args:
          mne_object: id.0
          duration: 2.0
          overlap: 0.0
          reject_by_annotation: "omit"

DerivativeList:
  - CleanedPrepRaw
  - CleanedPrep
