# Artifact-cleaned preprocessing pipeline.
#
# Equivalent of eeg_adhd_epilepsy/preproc/base.py run_base_pipeline:
#   ZapLine (60 Hz) → RANSAC bad channels → CAR → AutoReject (1s segments)
#
# Chain runs entirely in memory per recording; only the final Epochs are saved.
# Input: raw .vhdr recordings (same source as step-0_preprocessing.yml).
#
# Steps:
#   1. preprocess_raw   : bandpass 0.1–100 Hz, resample 256 Hz (continuous Raw)
#   2. zapline_denoise  : remove 60 Hz line noise (ZapLine / mne-denoise)
#   3. ransac_bad_channels : detect broken channels (pyprep NoisyChannels.find_bad_by_ransac)
#   4. apply_car        : common average reference (bad channels excluded)
#   5. autoreject_annotate : AutoReject on 1s segments → BAD annotations → 2s Epochs
#
# Output: {reference_base}@CleanedPrep.fif  (MNE Epochs)
#
# Usage:
#   neurodags run neurodags_pipelines/step-0b_preproc_cleaned.yml
#   # Then run step-1_features.yml against datasets_cleaned.yml

new_definitions: custom_nodes.py
datasets: datasets_raw.yml
mount_point: local

DerivativeDefinitions:

  CleanedPrep:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: SourceFile

      # 1. Filter (0.1–100 Hz) + resample to 256 Hz — keep wide band for ZapLine
      - id: 1
        node: preprocess_raw
        args:
          mne_object: id.0
          filter_args:
            l_freq: 0.1
            h_freq: 100.0
          resample: 256

      # 2. ZapLine: remove 60 Hz power line noise from continuous raw
      - id: 2
        node: zapline_denoise
        args:
          mne_object: id.1
          line_freq: 60.0
          adaptive: False

      # 3. RANSAC: mark broken channels in raw.info['bads']
      - id: 3
        node: ransac_bad_channels
        args:
          mne_object: id.2

      # 4. CAR: common average reference (bads excluded)
      - id: 4
        node: apply_car
        args:
          mne_object: id.3

      # 5. AutoReject: detect bad 1s segments → add BAD_epoch annotations
      #    → create 2s Epochs omitting rejected segments
      - id: 5
        node: autoreject_annotate
        args:
          mne_object: id.4
          segment_duration: 1.0
          min_epochs: 5
          epoch_duration: 2.0
          epoch_overlap: 0.0

DerivativeList:
  - CleanedPrep
