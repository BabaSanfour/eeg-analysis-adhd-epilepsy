# Condition-level epoch extraction from cleaned raw.
#
# Reads CleanedPrepRaw.fif produced by step-0b_preproc_cleaned.yml —
# the fully annotated Raw after ZapLine + RANSAC + CAR + blockwise AR.
# No preprocessing is applied here; all cleaning was done in step-0b.
#
# Extraction:
#   ConditionEO : fixed-length 2 s epochs within BLOCK_EO windows, BAD_ omitted
#   ConditionEC : fixed-length 2 s epochs within BLOCK_EC windows, BAD_ omitted
#
# This mirrors the original pipeline where extract_descriptors.py loads
# condition epochs from the already-cleaned annotated Raw.
#
# BrainVision round-trip wraps annotation descriptions in "Comment/" —
# extract_condition_epochs strips this automatically.
#
# Output: {reference_base}@ConditionEO.fif / @ConditionEC.fif  (MNE Epochs)
#
# Usage (run step-0b first):
#   neurodags run neurodags_pipelines/step-0b_preproc_cleaned.yml
#   neurodags run neurodags_pipelines/step-0c_conditions.yml

new_definitions: custom_nodes.py
datasets: datasets_cleaned_raw.yml
mount_point: local

DerivativeDefinitions:

  ConditionEO:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: SourceFile   # CleanedPrepRaw.fif — fully cleaned annotated Raw
      - id: 1
        node: extract_condition_epochs
        args:
          mne_object: id.0
          condition_name: EO
          annotation_prefix: "BLOCK_"
          epoch_duration: 2.0
          epoch_overlap: 0.0
          reject_by_annotation: "omit"

  ConditionEC:
    overwrite: False
    for_dataframe: False
    nodes:
      - id: 0
        derivative: SourceFile
      - id: 1
        node: extract_condition_epochs
        args:
          mne_object: id.0
          condition_name: EC
          annotation_prefix: "BLOCK_"
          epoch_duration: 2.0
          epoch_overlap: 0.0
          reject_by_annotation: "omit"

DerivativeList:
  - ConditionEO
  - ConditionEC
