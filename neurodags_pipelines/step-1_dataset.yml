# Datasets for step-1_pipeline@extraction.yml — one entry per BLOCK_* segment type.
#
# file_pattern: *@CleanedPrep.<condition>.fif — per-condition Epochs artifact from
#   epoch_by_condition splitter in step-0_pipeline@preprocessing. Each entry points to its own condition file.
# derivatives_path: condition-specific output directory.
#
# Usage:
#   1. Activate ONE condition entry (remove skip: true for that entry).
#   2. neurodags run neurodags_pipelines/step-1_pipeline@extraction.yml

# EO conditions ---------------------------------------------------------------

eeg_adhd_epilepsy_EO_baseline:
  name: eeg_adhd_epilepsy_EO_baseline
  file_pattern:
    local: "/home/yorguin/datasets/eeg-adhd-epilepsy/derivatives/preprocessing/**/*@CleanedPrep.EO_baseline.fif"
    fir: "/home/yorguin/scratch/real_scratch/eeg_adhd_outputs/preprocessing/**/*@CleanedPrep.EO_baseline.fif"
  derivatives_path:
    local: "/home/yorguin/datasets/eeg-adhd-epilepsy/derivatives/features_conditions/EO_baseline"
    fir: "/home/yorguin/scratch/real_scratch/eeg_adhd_outputs/features_conditions/EO_baseline"

