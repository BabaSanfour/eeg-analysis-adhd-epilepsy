# Datasets for step-1_pipeline@extraction.yml — one entry per condition.
#
# file_pattern: *@CleanedPrepRaw.fif — annotated Raw from step-0_pipeline@preprocessing.
#   All entries share the same source pattern; condition epoching happens in-memory in step-1.
# derivatives_path: condition-specific output directory.
# vars.condition_name: passed as $condition_name to extract_condition_epochs in the pipeline.
#
# Usage:
#   neurodags run neurodags_pipelines/step-1_pipeline@extraction.yml
#
# No pipeline YAML edits needed — the active entry's vars.condition_name drives everything.
# All 8 real conditions active. synthetic_eeg kept skipped (dev only).

# EO conditions ---------------------------------------------------------------

eeg_adhd_epilepsy_EO_baseline:
  name: eeg_adhd_epilepsy_EO_baseline
  vars: {condition_name: EO_baseline}
  file_pattern:
    local: "/home/yorguin/datasets/eeg-adhd-epilepsy/derivatives/preprocessing/**/*@CleanedPrepRaw.fif"
    fir: "/home/yorguin/scratch/real_scratch/eeg_adhd_outputs/preprocessing/**/*@CleanedPrepRaw.fif"
  derivatives_path:
    local: "/home/yorguin/datasets/eeg-adhd-epilepsy/derivatives/features_conditions/EO_baseline"
    fir: "/home/yorguin/scratch/real_scratch/eeg_adhd_outputs/features_conditions/EO_baseline"

