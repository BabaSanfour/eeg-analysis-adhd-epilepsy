bids_root: /path/to/BIDS
metadata: /path/to/patients_metadata_clean.csv
dataset_name: adhd_epilepsy_foundation_embeddings
run_label: all_models
subject_col: study_id
session_col: session
task: clinical
desc: base
use_derivatives: true
segment_duration: 10.0
overlap: 0.0
window_mismatch_policy: error
conditions:
  - EO_baseline
  - EC_baseline
models:
  - model_key: cbramod
    segment_duration: 10.0
    window_source: derivative
    pooling: mean
    recording_pooling: mean
  - model_key: labram
    # LaBraM is pretrained on exactly 3000 samples at 200 Hz (15 s). The saved
    # epoch derivative is 10 s, so re-epoch the cleaned continuous desc-base
    # recording at 15 s (same continuous-stage cleaning as the other models,
    # minus per-epoch autoreject; recorded in the embedding sidecar).
    segment_duration: 15.0
    window_source: re_epoch
    pooling: mean
    recording_pooling: mean
    backend_kwargs:
      interpolate_channels: true
  - model_key: reve
    segment_duration: 10.0
    window_source: derivative
    pooling: mean
    recording_pooling: mean
  - model_key: luna
    segment_duration: 10.0
    window_source: derivative
    pooling: mean
    recording_pooling: mean
device: auto
overwrite: false
bids_version: 1.11.1
report_asset_urls: inline
