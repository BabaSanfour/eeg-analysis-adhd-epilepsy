task: clinical
desc: base
dataset_name: foundation_embeddings
allow_transductive_input: false
conditions: [EO_baseline, EC_baseline]
models:
  - model_key: cbramod
    segment_duration: 10.0
    overlap: 0.0
    use_derivatives: true
    window_source: derivative
  - model_key: labram
    segment_duration: 15.0
    overlap: 0.0
    use_derivatives: false
    window_source: re_epoch
    backend_kwargs:
      interpolate_channels: true
  - model_key: reve
    segment_duration: 10.0
    overlap: 0.0
    use_derivatives: true
    window_source: derivative
  - model_key: luna
    segment_duration: 10.0
    overlap: 0.0
    use_derivatives: true
    window_source: derivative
  - model_key: biot
    segment_duration: 10.0
    overlap: 0.0
    use_derivatives: false
    window_source: re_epoch
    backend_kwargs:
      interpolate_channels: true
  - model_key: signaljepa
    segment_duration: 10.0
    overlap: 0.0
    use_derivatives: false
    window_source: re_epoch
    backend_kwargs:
      interpolate_channels: true
  - model_key: eegpt
    segment_duration: 10.0
    overlap: 0.0
    use_derivatives: false
    window_source: re_epoch
  - model_key: bendr
    segment_duration: 10.0
    overlap: 0.0
    use_derivatives: false
    window_source: re_epoch
device: auto
precision: fp32
on_unsupported: skip
overwrite: false
detailed_unit_reports: true
report_asset_urls: inline
