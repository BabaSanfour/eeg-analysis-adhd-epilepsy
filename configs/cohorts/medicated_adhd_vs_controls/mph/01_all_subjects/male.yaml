dataset_name: mph_01_all_subjects_male
subject_col: study_id
conditions:
- EO_baseline
- EC_baseline
run_pooled: true
group_filters:
- adhd:
  - 0
  psychostimulant:
  - 0
- adhd:
  - 1
  psychostimulant:
  - 1
  psychostimulant_category:
  - Methylphenidate
filter_col:
- sex
- age_group
filter_val:
- - M
- - 5-8
  - 9-12
  - 13-18
evals:
- name: med_adhd_vs_ctrl
  target_col: combined_diagnosis
  group_col: patient_group_id
  label_map:
    Control: '0'
    Epilepsy: '0'
    ASD: '0'
    ASD+Epilepsy: '0'
    ADHD: '1'
    ADHD+Epilepsy: '1'
    ADHD+ASD: '1'
    ADHD+ASD+Epilepsy: '1'
- name: age_separation
  target_col: age_group
  group_col: patient_group_id
- name: condition_separation
  target_col: condition
  group_col: patient_group_id
