bids_root: /path/to/BIDS
metadata: /path/to/patients_metadata_clean.csv
dataset_name: pooled_01_all_subjects_total
output_group: medicated_adhd_vs_controls/pooled
subject_col: study_id
session_col: session
group_col: patient_group_id
input_mode: descriptors
# For input_mode: foundation_embeddings, set both:
# embedding_derivative_root: /path/to/BIDS/derivatives/foundation_embeddings
# embedding_model_key: cbramod
descriptor_table_path: /path/to/descriptors/combined/sensor_subject_features.parquet
descriptor_feature_columns_path: /path/to/descriptors/combined/sensor_subject_feature_columns.json
# When the feature table carries both mean and median epoch-aggregates, pick the
# location statistic to feed the model: 'mean' | 'median'. Omit to keep both.
# Spread stats (iqr/mad) and ratios are unaffected.
location_statistic: median
qc:
  column_prune:
    enabled: true
    max_missing_rate: 0.20
    drop_constant: true
    # Prefer dropping NaN-bearing columns over dropping recordings: greedily drop
    # the worst NaN columns until row loss is within this fraction (0.0 = never
    # drop a recording for NaN; omit to keep the plain any-NaN row purge).
    max_row_drop_rate: 0.0
  outlier:
    z_threshold: 5.0
    # Per-group drop granularity. Omit group_by entirely for one global decision.
    #   family  → band / param / complexity   (coarsest; bad alpha can drop the
    #             subject from all band analyses)
    #   measure → log_abs_alpha, sample_entropy, …  (recommended; bad alpha drops
    #             the subject from alpha analyses only, not beta or complexity)
    #   feature → one descriptor × channel    (finest; fraction degenerates to a
    #             per-feature univariate outlier flag)
    group_by: measure
    epoch_outlier_fraction: 0.30
    subject_outlier_fraction: 0.20
  min_obs: 5
conditions:
  - EO_baseline
  - EC_baseline
run_pooled: true
analysis_modes:
  - flat
  - sensor
  - subfamily
  - sensor_within_subfamily
  - descriptor
  - descriptor_sensor
feature_selection:
  # The no-selection baseline is always run. SFS is opt-in and restricted to
  # the analysis modes listed here.
  - name: sfs
    method: sfs
    direction: forward
    scoring: balanced_accuracy
    tol: 0.001
    analysis_modes:
      - flat
      - sensor
      - subfamily
      - sensor_within_subfamily
models:
  logreg_l1:
    estimator: LogisticRegression
    analysis_modes:
      - flat
      - sensor
      - subfamily
      - sensor_within_subfamily
      - descriptor
      - descriptor_sensor
    params:
      penalty: l1
      solver: saga
      class_weight: balanced
      max_iter: 5000
  random_forest:
    estimator: RandomForestClassifier
    # Runs on every analysis mode (omit analysis_modes = all modes). Note: on
    # descriptor_sensor (one descriptor at one sensor, ~2 columns) RF has little
    # to work with — drop descriptor_sensor here if you want to save the compute.
    params:
      n_estimators: 300
      class_weight: balanced
      n_jobs: 1
cv:
  n_splits: 5
# Chance-level / significance assessment (shared by classical and foundation decoding).
# "permutation" builds an empirical, subject-level null (shuffles labels within
# group_id), so the significance threshold reflects the number of subjects rather
# than the theoretical 0.5. "binomial" uses the analytical theoretical chance level.
# Permutation refits the full pipeline per shuffle, so runtime scales with n_permutations.
chance_method: permutation
n_permutations: 100
store_null_distribution: false
metrics:
  - accuracy
  - balanced_accuracy
  - f1
  - precision
  - recall
  - roc_auc
evals:
  - name: med_adhd_vs_ctrl
    target_col: combined_diagnosis
    label_map:
      Control: "0"
      Epilepsy: "0"
      ASD: "0"
      ASD+Epilepsy: "0"
      ADHD: "1"
      ADHD+Epilepsy: "1"
      ADHD+ASD: "1"
      ADHD+ASD+Epilepsy: "1"
    positive_class: "1"
group_filters:
  - adhd: [0]
    psychostimulant: [0]
  - adhd: [1]
    psychostimulant: [1]
random_state: 42
n_jobs: 1
overwrite: false
allow_transductive_input: false
detailed_unit_reports: true
detailed_unit_report_modes:
  - flat
report_asset_urls: inline
