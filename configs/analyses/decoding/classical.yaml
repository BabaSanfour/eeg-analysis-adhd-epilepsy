# Classical decoding analysis config — method + hyperparameters only.
# Pair with a cohort config via --cohort_config + --analysis_config.
# Cohort configs supply: dataset_name, conditions, evals,
# subject_col, group_filters, filter_col/filter_val, run_pooled.

input_mode: descriptors

descriptor_table_path: /Users/hamzaabdelhedi/Projects/data/EEG_psychostimulant_data/EEG_psychostimulants_2025-02/BIDS/derivatives/signal_features/descriptors/combined/sensor_recording_features.parquet
descriptor_feature_columns_path: /Users/hamzaabdelhedi/Projects/data/EEG_psychostimulant_data/EEG_psychostimulants_2025-02/BIDS/derivatives/signal_features/descriptors/combined/sensor_recording_features_feature_columns.json

location_statistic: mean

qc:
  column_prune:
    enabled: true
    max_missing_rate: 0.2
    drop_constant: true
    max_row_drop_rate: 0.0
  outlier:
    z_threshold: 5.0
    group_by: measure
    epoch_outlier_fraction: 0.3
    subject_outlier_fraction: 0.2
  min_obs: 5

analysis_modes:
  - flat
  - sensor
  - subfamily
  - sensor_within_subfamily
  - descriptor
  - descriptor_sensor

feature_selection:
  - name: baseline
    method: none
  - name: sfs
    method: sfs
    direction: forward
    scoring: balanced_accuracy
    tol: 0.001
    analysis_modes:
      - flat
      - sensor
      - subfamily
      - sensor_within_subfamily

tuning:
  enabled: true
  scoring: balanced_accuracy
  n_splits: 3

models:
  logreg_enet:
    estimator: LogisticRegression
    analysis_modes:
      - flat
      - sensor
      - subfamily
      - descriptor
    params:
      penalty: elasticnet
      solver: saga
      l1_ratio: 0.5
      class_weight: balanced
      max_iter: 5000
    grid:
      C: [0.01, 0.1, 1.0, 10.0]
      l1_ratio: [0.2, 0.5, 0.8]
  logreg_enet_fixed:
    estimator: LogisticRegression
    analysis_modes:
      - sensor_within_subfamily
      - descriptor_sensor
    params:
      penalty: elasticnet
      solver: saga
      C: 1.0
      l1_ratio: 0.5
      class_weight: balanced
      max_iter: 5000
  random_forest:
    estimator: RandomForestClassifier
    analysis_modes:
      - flat
      - sensor
      - subfamily
      - descriptor
    params:
      n_estimators: 300
      class_weight: balanced
      n_jobs: 1
  random_forest_medium:
    estimator: RandomForestClassifier
    analysis_modes:
      - sensor_within_subfamily
    params:
      n_estimators: 150
      max_depth: 5
      class_weight: balanced
      n_jobs: 1
  random_forest_light:
    estimator: RandomForestClassifier
    analysis_modes:
      - descriptor_sensor
    params:
      n_estimators: 100
      max_depth: 3
      class_weight: balanced
      n_jobs: 1

cv:
  n_splits: 5

chance_method: binomial
n_permutations: 20
store_null_distribution: false

metrics:
  - accuracy
  - balanced_accuracy
  - f1
  - precision
  - recall
  - roc_auc

session_col: session_id
subject_col: study_id
task: clinical
desc: base
representation: subject
run_pooled: true
random_state: 42
n_jobs: -1
verbose: true
overwrite: false

detailed_unit_reports: true
detailed_unit_report_modes:
  - flat
report_asset_urls: inline
