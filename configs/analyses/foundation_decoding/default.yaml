task: clinical
desc: base
use_derivatives: true
segment_duration: 10.0
overlap: 0.0
window_mismatch_policy: error
allow_transductive_input: false
conditions: [EO_baseline, EC_baseline]
models:
  - model_key: cbramod
    segment_duration: 10.0
    window_source: derivative
  - model_key: labram
    segment_duration: 15.0
    window_source: re_epoch
    backend_kwargs:
      interpolate_channels: true
  - model_key: reve
    segment_duration: 10.0
    window_source: derivative
  - model_key: luna
    segment_duration: 10.0
    window_source: derivative
train_modes: [linear_probe, full, lora]
training_defaults:
  linear_probe:
    max_epochs: 20
    lr: 0.001
    batch_size: 16
    early_stopping_patience: 5
  full:
    max_epochs: 10
    lr: 0.00001
    batch_size: 8
    early_stopping_patience: 3
  lora:
    max_epochs: 15
    lr: 0.0001
    batch_size: 8
    early_stopping_patience: 4
cv:
  n_splits: 5
chance_method: permutation
n_permutations: 100
store_null_distribution: false
class_weight: balanced
device: auto
precision: fp32
on_unsupported: skip
overwrite: false
detailed_unit_reports: true
report_asset_urls: inline
